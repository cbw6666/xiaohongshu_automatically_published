<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 100%;
      min-width: 350px;
      max-width: 450px;
      min-height: 100vh;
      font-family: 'SF Pro', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0D1117;
      color: #E6EDF3;
      overflow-x: hidden;
    }
    .main-wrapper {
      background: #161B22;
      border-radius: 12px;
      border: 1px solid #30363D;
      margin: 12px 8px 8px 8px;
      padding: 16px 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: calc(100vh - 24px);
    }
    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid #30363D;
    }
    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #58A6FF;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      background: rgba(88,166,255,0.08);
      border: 1px solid #30363D;
      color: #8B949E;
      border-radius: 8px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      cursor: pointer;
      padding: 0;
    }
    .icon-btn:hover {
      background: rgba(88,166,255,0.15);
      border-color: #58A6FF;
      color: #58A6FF;
    }
    /* Section Labels */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #8B949E;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    /* Buttons */
    .btn {
      background: rgba(88,166,255,0.1);
      color: #58A6FF;
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }
    .btn:hover {
      background: rgba(88,166,255,0.2);
      border-color: #58A6FF;
      box-shadow: 0 0 12px rgba(88,166,255,0.15);
    }
    .btn-danger {
      background: rgba(248,81,73,0.1);
      color: #F85149;
      border-color: rgba(248,81,73,0.3);
    }
    .btn-danger:hover {
      background: rgba(248,81,73,0.2);
      border-color: #F85149;
      box-shadow: 0 0 12px rgba(248,81,73,0.15);
    }
    .btn-success {
      background: rgba(63,185,80,0.1);
      color: #3FB950;
      border-color: rgba(63,185,80,0.3);
    }
    .btn-success:hover {
      background: rgba(63,185,80,0.2);
      border-color: #3FB950;
      box-shadow: 0 0 12px rgba(63,185,80,0.15);
    }
    /* File Input Hidden */
    #fileInput { display: none; }
    /* Notes Container */
    .notes-container {
      max-height: 220px;
      overflow-y: auto;
      border-radius: 10px;
      background: #0D1117;
      border: 1px solid #30363D;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .notes-container::-webkit-scrollbar { width: 6px; }
    .notes-container::-webkit-scrollbar-track { background: transparent; }
    .notes-container::-webkit-scrollbar-thumb { background: #30363D; border-radius: 3px; }
    /* Note Panel */
    .note-panel {
      background: #161B22;
      border-radius: 10px;
      border: 1px solid #30363D;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .note-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .note-title { font-size: 13px; font-weight: 600; color: #E6EDF3; }
    .note-actions { display: flex; gap: 4px; }
    .note-actions .icon-btn { width: 26px; height: 26px; }
    /* Image Preview */
    .image-preview {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 0;
    }
    .image-preview img {
      width: 54px;
      height: 54px;
      border-radius: 6px;
      border: 1px solid #30363D;
      object-fit: cover;
      background: #0D1117;
    }
    /* Preview Items */
    .preview-item { display: flex; flex-direction: column; gap: 2px; }
    .preview-item label {
      font-size: 11px;
      font-weight: 600;
      color: #8B949E;
      text-transform: uppercase;
    }
    .preview-item input, .preview-item textarea {
      background: #0D1117;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      color: #E6EDF3;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .preview-item input:focus, .preview-item textarea:focus {
      outline: none;
      border-color: #58A6FF;
      box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
    }
    .preview-item textarea { min-height: 36px; resize: vertical; }
    /* Settings Panel */
    .settings-panel {
      background: #0D1117;
      border-radius: 10px;
      border: 1px solid #30363D;
      padding: 12px 10px;
    }
    .setting-item {
      margin-bottom: 10px;
    }
    .setting-item:last-child { margin-bottom: 0; }
    .setting-item > label {
      font-size: 12px;
      font-weight: 600;
      color: #8B949E;
      display: block;
      margin-bottom: 6px;
    }
    .setting-item input[type="number"],
    .setting-item input[type="time"] {
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      color: #E6EDF3;
      width: 100px;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .setting-item input[type="number"]:focus,
    .setting-item input[type="time"]:focus {
      outline: none;
      border-color: #58A6FF;
      box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
    }
    /* Radio Group - Segment Control */
    .radio-group {
      display: inline-flex;
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 8px;
      overflow: hidden;
    }
    .radio-group label {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #8B949E;
      cursor: pointer;
      transition: all 0.2s;
      border-right: 1px solid #30363D;
      user-select: none;
    }
    .radio-group label:last-child { border-right: none; }
    .radio-group input[type="radio"] { display: none; }
    .radio-group input[type="radio"]:checked + span {
      color: #58A6FF;
    }
    .radio-group label.active {
      background: rgba(88,166,255,0.15);
      color: #58A6FF;
    }
    /* Range Inputs */
    .range-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .range-inputs span { color: #8B949E; font-size: 12px; }
    /* Publish Mode Tabs */
    .mode-tabs {
      display: flex;
      background: #0D1117;
      border: 1px solid #30363D;
      border-radius: 10px;
      overflow: hidden;
    }
    .mode-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #8B949E;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: none;
    }
    .mode-tab.active {
      background: rgba(88,166,255,0.12);
      color: #58A6FF;
    }
    .mode-tab:hover:not(.active) {
      background: rgba(88,166,255,0.06);
    }
    /* Mode Content */
    .mode-content { display: none; }
    .mode-content.active { display: block; }
    /* Schedule Status */
    .schedule-status {
      background: rgba(63,185,80,0.08);
      border: 1px solid rgba(63,185,80,0.2);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      color: #3FB950;
      display: none;
    }
    .schedule-status.active { display: block; }
    /* Action Buttons Row */
    .action-row {
      display: flex;
      gap: 8px;
    }
    .action-row .btn { flex: 1; }
    /* Log Panel */
    .logs-container {
      background: #0D1117;
      border-radius: 10px;
      border: 1px solid #30363D;
      padding: 8px;
      max-height: 140px;
      overflow-y: auto;
    }
    .logs-container::-webkit-scrollbar { width: 6px; }
    .logs-container::-webkit-scrollbar-track { background: transparent; }
    .logs-container::-webkit-scrollbar-thumb { background: #30363D; border-radius: 3px; }
    .log-panel { max-height: 130px; overflow-y: auto; }
    .log-item {
      border-radius: 6px;
      margin-bottom: 4px;
      padding: 5px 8px;
      font-size: 12px;
      background: #161B22;
      color: #8B949E;
      border-left: 3px solid #30363D;
    }
    .log-item.success {
      background: rgba(63,185,80,0.08);
      color: #3FB950;
      border-left-color: #3FB950;
    }
    .log-item.error {
      background: rgba(248,81,73,0.08);
      color: #F85149;
      border-left-color: #F85149;
    }
    .log-item.step {
      background: rgba(210,153,34,0.08);
      color: #D29922;
      border-left-color: #D29922;
    }
    .log-item.countdown {
      background: rgba(210,153,34,0.12);
      color: #D29922;
      font-weight: 600;
      white-space: pre-line;
    }
    /* SVG Icons */
    .svg-icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      display: inline-block;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="mainContent">
    <div class="main-wrapper">
      <!-- Header -->
      <div class="header">
        <span class="header-title">小红书自动发布 V4.0</span>
        <div class="header-right">
          <button class="icon-btn help-btn" title="使用说明">
            <svg class="svg-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 1 1 5.82 1c0 2-3 2-3 4"/><circle cx="12" cy="17" r=".5"/></svg>
          </button>
          <button class="icon-btn close-btn" title="关闭">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <!-- 1. 选择文档 -->
      <div class="section-label">1. 选择文档文件</div>
      <input type="file" id="fileInput" accept=".csv,.txt,.xlsx,.xls">
      <button id="readFile" class="btn">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
        选择文档文件 (CSV/TXT/Excel)
      </button>

      <!-- 2. 笔记预览 -->
      <div class="section-label">2. 笔记预览区</div>
      <div class="notes-container"></div>

      <!-- 3. 发布模式 -->
      <div class="section-label">3. 发布设置</div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="immediate">立即发布</button>
        <button class="mode-tab" data-mode="scheduled">定时发布</button>
      </div>

      <!-- 立即发布设置 -->
      <div class="settings-panel mode-content active" id="immediateSettings">
        <div class="setting-item" style="background:rgba(210,153,34,0.08); border-radius:8px; padding:8px; border-left:3px solid #D29922; margin-bottom:10px;">
          <label style="color:#D29922; font-size:11px; margin-bottom:0;">
            安全建议：间隔建议设置 50~80 分钟随机模式，篇间等待已自动加入 ±35% 随机抖动
          </label>
        </div>
        <div class="setting-item">
          <label>发布间隔:</label>
          <div class="radio-group" id="intervalTypeGroup">
            <label class="active"><input type="radio" name="intervalType" value="fixed" checked><span>固定间隔</span></label>
            <label><input type="radio" name="intervalType" value="random"><span>随机间隔</span></label>
          </div>
        </div>
        <div class="setting-item fixed-interval">
          <label>固定间隔时间 (分钟):</label>
          <input type="number" id="fixedInterval" value="5" min="1" max="120">
        </div>
        <div class="setting-item random-interval" style="display:none;">
          <label>随机间隔范围 (分钟):</label>
          <div class="range-inputs">
            <input type="number" id="minInterval" value="5" min="1" max="120">
            <span>至</span>
            <input type="number" id="maxInterval" value="10" min="1" max="120">
          </div>
        </div>
        <div class="setting-item">
          <label>从第几篇开始:</label>
          <input type="number" id="startRow" value="1" min="1">
        </div>
        <div class="setting-item">
          <label>本次发布篇数 (0=全部):</label>
          <input type="number" id="publishCount" value="0" min="0">
        </div>
      </div>

      <!-- 定时发布设置 -->
      <div class="settings-panel mode-content" id="scheduledSettings">
        <div class="setting-item" style="background:rgba(210,153,34,0.08); border-radius:8px; padding:8px; border-left:3px solid #D29922; margin-bottom:10px;">
          <label style="color:#D29922; font-size:11px; margin-bottom:0;">
            安全建议：间隔建议 50~80 分钟随机，每天不超过 8 篇，启动时间和篇间等待已自动随机化
          </label>
        </div>
        <div class="setting-item">
          <label>每天启动时间:</label>
          <input type="time" id="dailyStartTime" value="09:00">
        </div>
        <div class="setting-item">
          <label>每天发布篇数:</label>
          <input type="number" id="dailyCount" value="5" min="1" max="50">
        </div>
        <div class="setting-item">
          <label>发布间隔:</label>
          <div class="radio-group" id="schedIntervalTypeGroup">
            <label class="active"><input type="radio" name="schedIntervalType" value="fixed" checked><span>固定间隔</span></label>
            <label><input type="radio" name="schedIntervalType" value="random"><span>随机间隔</span></label>
          </div>
        </div>
        <div class="setting-item sched-fixed-interval">
          <label>固定间隔时间 (分钟):</label>
          <input type="number" id="schedFixedInterval" value="5" min="1" max="120">
        </div>
        <div class="setting-item sched-random-interval" style="display:none;">
          <label>随机间隔范围 (分钟):</label>
          <div class="range-inputs">
            <input type="number" id="schedMinInterval" value="5" min="1" max="120">
            <span>至</span>
            <input type="number" id="schedMaxInterval" value="10" min="1" max="120">
          </div>
        </div>
        <div class="setting-item">
          <label>从第几篇开始:</label>
          <input type="number" id="schedStartRow" value="1" min="1">
        </div>
      </div>

      <!-- Schedule Status -->
      <div class="schedule-status" id="scheduleStatus">
        定时发布已启动，等待执行...
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button id="startButton" class="btn btn-success">
          <svg class="svg-icon" viewBox="0 0 24 24"><path d="M5 3v18l15-9L5 3z"/></svg>
          开始运行
        </button>
        <button id="clearAllButton" class="btn btn-danger">
          <svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
          终止程序
        </button>
      </div>

      <!-- 4. 日志 -->
      <div class="section-label">4. 运行日志</div>
      <div class="logs-container">
        <div class="log-panel" id="logPanel"></div>
      </div>
    </div>
  </div>

  <script src="lib/xlsx.full.min.js"></script>
  <script src="lib/jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
