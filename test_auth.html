<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>卡密验证测试</title>
  <style>
    body {
      font-family: 'SF Pro', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      line-height: 1.6;
      color: #2D3748;
    }
    .test-section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #3182CE;
    }
    .test-section h2 {
      color: #2D3748;
      margin-top: 0;
    }
    .test-form {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    .test-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #E2E8F0;
      border-radius: 6px;
      font-size: 14px;
    }
    .test-btn {
      padding: 8px 16px;
      background: #3182CE;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .test-btn:hover {
      background: #2B6CB0;
    }
    .test-result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    .test-result.success {
      background: #EBF8FF;
      border: 1px solid #3182CE;
      color: #3182CE;
    }
    .test-result.error {
      background: #FFF5F5;
      border: 1px solid #E53E3E;
      color: #E53E3E;
    }
    .test-result.info {
      background: #F7FAFC;
      border: 1px solid #E2E8F0;
      color: #2D3748;
    }
  </style>
</head>
<body>
  <h1>卡密验证功能测试</h1>
  
  <div class="test-section">
    <h2>1. 生成UDID测试</h2>
    <button class="test-btn" onclick="testGenerateUDID()">生成UDID</button>
    <div id="udidResult" class="test-result info" style="display: none;"></div>
  </div>

  <div class="test-section">
    <h2>2. 卡密验证测试</h2>
    <div class="test-form">
      <input type="text" id="testCardKey" class="test-input" placeholder="输入测试卡密">
      <button class="test-btn" onclick="testCardKeyVerification()">验证卡密</button>
    </div>
    <div id="verificationResult" class="test-result info" style="display: none;"></div>
  </div>

  <div class="test-section">
    <h2>3. 认证状态测试</h2>
    <button class="test-btn" onclick="testAuthState()">检查认证状态</button>
    <button class="test-btn" onclick="clearAuthState()">清除认证状态</button>
    <div id="authStateResult" class="test-result info" style="display: none;"></div>
  </div>

  <div class="test-section">
    <h2>4. 版本检查测试</h2>
    <button class="test-btn" onclick="testVersionCheck()">检查版本</button>
    <div id="versionResult" class="test-result info" style="display: none;"></div>
  </div>

  <script>
    // 卡密验证相关配置
    const AUTH_CONFIG = {
      API_URL: 'http://user.weichuang.club/api/user/1002/xhs/2.0/logon',
      APP_ID: '1002',
      VERSION: '2.0',
      SOFTWARE_INDEX: 'xhs'
    };

    // 生成浏览器唯一标识
    function generateUDID() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      ctx.textBaseline = 'top';
      ctx.font = '14px Arial';
      ctx.fillText('Browser fingerprint', 2, 2);
      
      const fingerprint = canvas.toDataURL();
      const userAgent = navigator.userAgent;
      const screenInfo = `${screen.width}x${screen.height}x${screen.colorDepth}`;
      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      
      // 创建唯一标识
      const uniqueString = fingerprint + userAgent + screenInfo + timezone;
      let hash = 0;
      for (let i = 0; i < uniqueString.length; i++) {
        const char = uniqueString.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // 转换为32位整数
      }
      
      return 'DAS' + Math.abs(hash).toString(36).toUpperCase().substring(0, 5);
    }

    // 测试生成UDID
    function testGenerateUDID() {
      const udid = generateUDID();
      const result = document.getElementById('udidResult');
      result.style.display = 'block';
      result.className = 'test-result success';
      result.textContent = `生成的UDID: ${udid}\n\n生成信息:\n- 用户代理: ${navigator.userAgent.substring(0, 100)}...\n- 屏幕信息: ${screen.width}x${screen.height}x${screen.colorDepth}\n- 时区: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
    }

    // 测试卡密验证
    async function testCardKeyVerification() {
      const cardKey = document.getElementById('testCardKey').value.trim();
      if (!cardKey) {
        alert('请输入卡密');
        return;
      }

      const result = document.getElementById('verificationResult');
      result.style.display = 'block';
      result.className = 'test-result info';
      result.textContent = '正在验证卡密...';

      try {
        const udid = generateUDID();
        
        // 准备请求数据
        const formData = new FormData();
        formData.append('account', cardKey);
        formData.append('password', '');
        formData.append('udid', udid);
        
        // 发送验证请求
        const response = await fetch(AUTH_CONFIG.API_URL, {
          method: 'POST',
          body: formData
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (data.code === 200) {
          const authData = JSON.parse(data.data);
          result.className = 'test-result success';
          result.textContent = `验证成功!\n\n返回数据:\n${JSON.stringify(data, null, 2)}\n\n解析后的认证信息:\n${JSON.stringify(authData, null, 2)}\n\nUDID: ${udid}`;
        } else {
          result.className = 'test-result error';
          result.textContent = `验证失败: ${data.msg}\n\n返回数据:\n${JSON.stringify(data, null, 2)}\n\nUDID: ${udid}`;
        }
      } catch (error) {
        result.className = 'test-result error';
        result.textContent = `验证出错: ${error.message}\n\n错误详情:\n${error.stack}`;
      }
    }

    // 测试认证状态
    async function testAuthState() {
      const result = document.getElementById('authStateResult');
      result.style.display = 'block';
      result.className = 'test-result info';
      
      try {
        // 模拟chrome.storage.local.get
        const mockStorage = {
          authState: {
            isAuthenticated: true,
            token: 'test_token_123',
            cardNo: 'TEST123456',
            vipExpTime: Math.floor(Date.now() / 1000) + 86400, // 24小时后过期
            udid: generateUDID(),
            timestamp: Date.now()
          }
        };
        
        const authData = mockStorage.authState;
        const now = Date.now();
        const savedTime = authData.timestamp || 0;
        const hoursDiff = (now - savedTime) / (1000 * 60 * 60);
        
        let status = '';
        status += `认证状态检查:\n`;
        status += `- 是否认证: ${authData.isAuthenticated}\n`;
        status += `- 卡密: ${authData.cardNo}\n`;
        status += `- Token: ${authData.token}\n`;
        status += `- UDID: ${authData.udid}\n`;
        status += `- 到期时间: ${new Date(authData.vipExpTime * 1000).toLocaleString()}\n`;
        status += `- 保存时间: ${new Date(savedTime).toLocaleString()}\n`;
        status += `- 时间差: ${hoursDiff.toFixed(2)} 小时\n`;
        
        if (hoursDiff < 24) {
          const currentTime = Math.floor(Date.now() / 1000);
          if (currentTime < authData.vipExpTime) {
            status += `- 状态: 认证有效\n`;
            result.className = 'test-result success';
          } else {
            status += `- 状态: 卡密已到期\n`;
            result.className = 'test-result error';
          }
        } else {
          status += `- 状态: 认证已过期（超过24小时）\n`;
          result.className = 'test-result error';
        }
        
        result.textContent = status;
      } catch (error) {
        result.className = 'test-result error';
        result.textContent = `检查认证状态出错: ${error.message}`;
      }
    }

    // 清除认证状态
    function clearAuthState() {
      const result = document.getElementById('authStateResult');
      result.style.display = 'block';
      result.className = 'test-result success';
      result.textContent = '认证状态已清除（模拟）';
    }

    // 测试版本检查
    function testVersionCheck() {
      const result = document.getElementById('versionResult');
      result.style.display = 'block';
      result.className = 'test-result info';
      
      const currentVersion = AUTH_CONFIG.VERSION;
      const testVersions = ['1.0', '2.0', '3.0', '4.0'];
      
      let status = `版本检查测试:\n`;
      status += `- 当前版本: ${currentVersion}\n\n`;
      
      testVersions.forEach(version => {
        if (version !== currentVersion) {
          status += `- 版本 ${version}: 需要升级\n`;
        } else {
          status += `- 版本 ${version}: 当前版本 ✓\n`;
        }
      });
      
      status += `\n版本升级逻辑:\n`;
      status += `if (data.info.version && data.info.version !== AUTH_CONFIG.VERSION) {\n`;
      status += `  throw new Error('版本不匹配，请下载最新版本');\n`;
      status += `}\n`;
      
      result.textContent = status;
    }
  </script>
</body>
</html>
